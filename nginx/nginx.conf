events {
  worker_connections 1024;
}

http {
  server {
    listen 80;

    # Identity Service — auth và users
    location /api/auth {
      proxy_pass http://identity-service:3001/api/auth;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/users {
      proxy_pass http://identity-service:3001/api/users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Admin Routing
    location /api/admin/users {
      proxy_pass http://identity-service:3001/api/admin/users;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/admin/stats {
      proxy_pass http://identity-service:3001/api/admin/stats;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/admin/orders {
      proxy_pass http://order-service:3003/api/admin/orders;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Catalog Service — products, brands, categories
    location /api/products {
      proxy_pass http://catalog-service:3002/api/products;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/brands {
      proxy_pass http://catalog-service:3002/api/brands;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/categories {
      proxy_pass http://catalog-service:3002/api/categories;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Order Service — orders, promotions
    location /api/orders {
      proxy_pass http://order-service:3003/api/orders;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/promotions {
      proxy_pass http://order-service:3003/api/promotions;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Payment Service — payments (MoMo)
    location /api/payment {
      proxy_pass http://payment-service:3004/api/payment;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    # Catalog Service — reviews, wishlist, news
    location /api/reviews {
      proxy_pass http://catalog-service:3002/api/reviews;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/wishlist {
      proxy_pass http://catalog-service:3002/api/wishlist;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location /api/news {
      proxy_pass http://catalog-service:3002/api/news;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }

    location / {
      proxy_pass http://frontend:5173/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
    }
  }
}